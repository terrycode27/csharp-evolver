name: NuGet Package & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # still triggers on tags (but version is forced to 0.1.0)
  pull_request:
    branches: [ main ]

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9 (explicit — fixes runner "not found" errors)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Verify .NET SDK version
        run: |
          echo "Installed .NET SDK:"
          dotnet --version
          echo ""
          dotnet --info

      - name: Restore dependencies
        run: dotnet restore Evolver5.csproj

      - name: Build project
        run: dotnet build Evolver5.csproj --no-restore --configuration Release

      - name: Pack NuGet package with fixed version 0.1.0
        run: |
          dotnet pack Evolver5.csproj --no-build --configuration Release -o ./nupkg \
            -p:PackageVersion=0.1.0 \
            -p:Version=0.1.0

      - name: Upload NuGet artifact (for manual download / inspection)
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/*.nupkg
          if-no-files-found: warn

      # Publish to GitHub Packages (on main OR tags) — allows overwrite
      - name: Publish to GitHub Packages
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/terrycode27/index.json \
            --skip-duplicate false

      # Publish to nuget.org (only on real version tags) — allows overwrite
      - name: Publish to nuget.org
        if: github.ref_type == 'tag'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate false
