name: NuGet Package & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # e.g. v1.2.3 triggers a real release
  pull_request:
    branches: [ main ]

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed for GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: |
          dotnet pack --no-build --configuration Release -o ./nupkg \
            -p:PackageVersion=${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}

      - name: Upload NuGet artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/*.nupkg

      # === Publish to GitHub Packages (free, no extra setup) ===
      - name: Publish to GitHub Packages
        if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/terrycode27/index.json \
            --skip-duplicate

      - name: Publish to nuget.org
        if: github.ref_type == 'tag'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
