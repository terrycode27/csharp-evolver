name: Auto-increment minor & publish NuGet
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Determine version increment
        id: version
        run: |
          CURRENT=$(grep -oP '(?<=<Version>).*?(?=</Version>)' Evolver5.csproj || echo "0.0.0")
          
          if [[ "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
          else
            NEW_VERSION="1.0.0"   # ← better fallback
          fi
          
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT → New: $NEW_VERSION"

      # Only bump & push if this is NOT a version-bump commit (prevent loop)
      - name: Bump version in .csproj
        if: |
          github.ref == 'refs/heads/main'
          && !contains(github.event.head_commit.message, '[skip ci]')
          && !contains(github.event.head_commit.message, 'bump version to')   # ← key: skip if previous commit was ours
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.new_version }}</Version>|" Evolver5.csproj
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Evolver5.csproj
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes — already bumped?"
          
          # Use origin remote with token auth (safer than plain git push)
          git push origin HEAD:main

      # ── Build & Pack ─────────────────────────────────────
      - name: Restore
        run: dotnet restore Evolver5.csproj

      - name: Build
        run: dotnet build Evolver5.csproj --no-restore --configuration Release

      - name: Pack
        run: |
          dotnet pack Evolver5.csproj \
            --no-build \
            --configuration Release \
            -o ./nupkg \
            -p:PackageVersion=${{ steps.version.outputs.new_version }}

      # Upload artifact (good to keep regardless)

      # Publish only on main (and optionally only if version was actually bumped)
      - name: Publish to nuget.org
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # GitHub Packages (optional)
